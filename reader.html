<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ColdLib Reader</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"/>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;touch-action:none}

/* ── THEMES ── */
:root{
  --bg:#f9f5eb;--text:#2c1a0a;--text-mute:#9c7850;
  --header-bg:rgba(249,245,235,0.96);--header-border:rgba(0,0,0,0.07);
  --progress-bg:rgba(0,0,0,0.08);--progress-fill:#c8a030;
  --panel-bg:#fff;--panel-border:#e8e0d0;
  --page-shadow:rgba(0,0,0,0.1);
}
[data-theme=dark]{
  --bg:#1a1510;--text:#e0d0b8;--text-mute:#806848;
  --header-bg:rgba(26,21,16,0.96);--header-border:rgba(255,255,255,0.06);
  --progress-bg:rgba(255,255,255,0.08);--progress-fill:#c8a030;
  --panel-bg:#242018;--panel-border:#3a3020;
  --page-shadow:rgba(0,0,0,0.4);
}
[data-theme=sepia]{
  --bg:#f4ead0;--text:#3a2010;--text-mute:#9a6840;
  --header-bg:rgba(244,234,208,0.96);--header-border:rgba(0,0,0,0.08);
  --progress-bg:rgba(0,0,0,0.1);--progress-fill:#a06020;
  --panel-bg:#f8f0dc;--panel-border:#d8c8a0;
  --page-shadow:rgba(0,0,0,0.12);
}

body{
  font-family:'Pretendard',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:background .3s,color .3s;
}

/* ── LOADING ── */
.loading{position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity .4s ease}
.loading.gone{opacity:0;pointer-events:none}
.loading .ms{font-family:'Material Symbols Outlined';font-size:40px;color:var(--progress-fill);
  animation:spin 1.4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:12px;font-weight:700;letter-spacing:.2em;color:var(--text-mute);text-transform:uppercase}

/* ── HEADER ── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:48px;
  display:flex;align-items:center;gap:8px;
  padding:0 12px;
  background:var(--header-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--header-border);
  transition:background .3s;
}
.btn-icon{width:36px;height:36px;border-radius:8px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-mute);transition:.2s;flex-shrink:0}
.btn-icon:hover{background:rgba(128,128,128,0.1)}
.btn-icon .ms{font-family:'Material Symbols Outlined';font-size:22px}

.header-title{flex:1;font-size:13px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;
  letter-spacing:.02em}
.header-page{font-size:11px;font-weight:700;color:var(--text-mute);
  flex-shrink:0;letter-spacing:.04em;min-width:52px;text-align:right}

/* ── STAGE (reading area) ── */
.stage{
  position:fixed;
  top:48px;left:0;right:0;
  bottom:6px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* ── PDF PAGE ── */
.page{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  padding:28px 24px 24px;
  overflow:hidden;
  display:flex;flex-direction:column;
  will-change:transform,opacity;
}
.page-canvas{
  flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.page-canvas canvas{
  max-width:100%;max-height:100%;
  object-fit:contain;
  box-shadow:0 4px 20px var(--page-shadow);
}

/* ── TXT SCROLLER (Multi-column) ── */
.txt-scroller {
  position:absolute; inset:0; overflow:hidden;
}
.txt-content {
  height: 100%;
  padding: 28px 24px 24px;
  box-sizing: border-box;
  /* 단 너비를 화면 전체(패딩 제외)로 설정하여 화면 단위로 끊기게 함 */
  column-width: calc(100vw - 48px);
  column-gap: 48px;
  word-break: break-word;
  white-space: pre-wrap;
  transition: transform 0.25s ease-out;
  color: var(--text);
  font-family: 'Nanum Myeongjo', Georgia, serif;
  font-size: var(--fsize, 17px);
  line-height: 1.95;
}

/* Corner decoration */
.stage::after{
  content:'';position:absolute;bottom:8px;right:8px;
  width:18px;height:18px;
  border-right:1px solid var(--text-mute);
  border-bottom:1px solid var(--text-mute);
  opacity:0.2;border-radius:0 0 2px 0;
  pointer-events: none;
}

/* ── SLIDE ANIMATIONS (For PDF) ── */
.slide-out-left { animation: slideOutLeft .25s ease-in forwards; }
.slide-in-right { animation: slideInRight .25s ease-out forwards; }
.slide-out-right { animation: slideOutRight .25s ease-in forwards; }
.slide-in-left { animation: slideInLeft .25s ease-out forwards; }

@keyframes slideOutLeft { to { transform: translateX(-30%); opacity: 0; } }
@keyframes slideInRight { from { transform: translateX(100%); opacity: 1; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideOutRight { to { transform: translateX(30%); opacity: 0; } }
@keyframes slideInLeft { from { transform: translateX(-100%); opacity: 1; } to { transform: translateX(0); opacity: 1; } }

/* ── TAP ZONES ── */
.tap-left,.tap-right{
  position:fixed;top:48px;bottom:6px;width:30%;
  z-index:50;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;
}
.tap-left{left:0}
.tap-right{right:0}
.tap-left:active,.tap-right:active{opacity:1;background:rgba(128,128,128,0.06)}
.tap-arrow{font-family:'Material Symbols Outlined';font-size:28px;color:var(--text-mute);opacity:.5}

/* ── PROGRESS BAR ── */
.progress{
  position:fixed;bottom:0;left:0;right:0;height:4px;
  background:var(--progress-bg);z-index:100;
}
.progress-fill{
  height:100%;background:var(--progress-fill);
  transition:width .3s ease;border-radius:0 2px 2px 0;
}

/* ── SETTINGS PANEL ── */
.settings-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .25s ease;
  display:flex;align-items:flex-end;justify-content:center;
}
.settings-overlay.on{opacity:1;pointer-events:all}
.settings-panel{
  width:100%;max-width:480px;
  background:var(--panel-bg);
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--panel-border);
  padding:0 0 calc(env(safe-area-inset-bottom) + 16px);
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.16,1,.3,1);
}
.settings-overlay.on .settings-panel{transform:translateY(0)}
.settings-handle{width:40px;height:4px;border-radius:2px;
  background:var(--panel-border);margin:14px auto 20px}
.settings-group{padding:0 20px 16px}
.settings-label{font-size:9.5px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;
  color:var(--text-mute);margin-bottom:10px;display:block}
/* Font size buttons */
.font-btns{display:flex;gap:8px}
.font-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--panel-border);
  background:transparent;color:var(--text);cursor:pointer;
  font-family:'Nanum Myeongjo',serif;font-weight:700;transition:.18s;text-align:center}
.font-btn:hover,.font-btn.active{border-color:var(--progress-fill);background:rgba(200,160,48,0.1);color:var(--text)}
.font-btn.active{background:rgba(200,160,48,0.18)}
/* Theme buttons */
.theme-btns{display:flex;gap:8px}
.theme-btn{flex:1;padding:10px 6px;border-radius:10px;border:1.5px solid var(--panel-border);
  background:transparent;cursor:pointer;font-size:11px;font-weight:700;
  transition:.18s;text-align:center;color:var(--text)}
.theme-btn:hover,.theme-btn.active{border-color:var(--progress-fill)}
.theme-btn.active{background:rgba(200,160,48,0.12)}
.settings-sep{height:1px;background:var(--panel-border);margin:0 20px 16px}

/* Error */
.error-box{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;background:var(--bg);padding:32px}
.error-box .ms{font-family:'Material Symbols Outlined';font-size:40px;color:#c0392b}
.error-box p{font-size:13px;color:var(--text-mute);text-align:center;line-height:1.6}
.error-box a{padding:11px 24px;background:#1a0c04;color:#f2e8d0;border-radius:10px;
  font-size:12px;font-weight:700;text-decoration:none;letter-spacing:.08em}
</style>
</head>
<body>

<div class="loading" id="loading">
  <span class="ms">auto_stories</span>
  <p>불러오는 중</p>
</div>

<header class="header">
  <button class="btn-icon" onclick="goBack()"><span class="ms">arrow_back</span></button>
  <button class="btn-icon" id="btnRotate" onclick="rotatePDF()" style="display:none;"><span class="ms">screen_rotation</span></button>
  <div class="header-title" id="hTitle">—</div>
  <div class="header-page" id="hPage">0 / 0</div>
  <button class="btn-icon" onclick="toggleSettings()"><span class="ms">tune</span></button>
</header>

<div class="stage" id="stage">
  <!-- PDF 용 -->
  <div class="page" id="pageEl"></div>
  
  <!-- TXT 용 (화면 분할 구조) -->
  <div class="txt-scroller" id="txtScroller" style="display:none;">
    <div class="txt-content" id="txtContent"></div>
  </div>
</div>

<div class="tap-left" onclick="prevPage()"><span class="tap-arrow">chevron_left</span></div>
<div class="tap-right" onclick="nextPage()"><span class="tap-arrow">chevron_right</span></div>

<div class="progress"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<!-- Settings -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings(event)">
  <div class="settings-panel">
    <div class="settings-handle"></div>
    <div class="settings-group">
      <span class="settings-label">글자 크기</span>
      <div class="font-btns">
        <button class="font-btn" data-size="15" onclick="setFont(15)">작게</button>
        <button class="font-btn" data-size="17" onclick="setFont(17)">보통</button>
        <button class="font-btn" data-size="20" onclick="setFont(20)">크게</button>
        <button class="font-btn" data-size="23" onclick="setFont(23)">최대</button>
      </div>
    </div>
    <div class="settings-sep"></div>
    <div class="settings-group">
      <span class="settings-label">테마</span>
      <div class="theme-btns">
        <button class="theme-btn" data-theme="light" onclick="setTheme('light')">☀️ 라이트</button>
        <button class="theme-btn" data-theme="sepia" onclick="setTheme('sepia')">📜 세피아</button>
        <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')">🌙 다크</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
/* ── URL PARAMS ── */
const params=new URLSearchParams(location.search);
const FILE=params.get('file')||'';
const EXT=FILE.split('.').pop().toLowerCase();
const TITLE=params.get('title')||decodeURIComponent(FILE.replace(/^.*\//, '').replace(/\.[^.]+$/, ''));

/* ── STATE ── */
let isTXT = (EXT !== 'pdf');
let pages=[];
let cur=0;
let total=0;
let animating=false;
let fontSize=parseInt(localStorage.getItem('coldlib_font')||'17');
let theme=localStorage.getItem('coldlib_theme')||'light';
let pdfRotation = 0; // PDF 회전 상태

/* ── INIT ── */
document.title=TITLE+' — ColdLib';
document.getElementById('hTitle').textContent=TITLE;
document.documentElement.dataset.theme=theme;
document.documentElement.style.setProperty('--fsize',fontSize+'px');
markActiveFont();markActiveTheme();

/* ── LOAD ── */
async function load(){
  if(!FILE){showError('파일 정보가 없습니다.','index.html로 돌아가기','index.html');return;}
  try{
    if(isTXT) await loadTXT();
    else await loadPDF();
    
    restorePosition();
    doneLoading();
    
    if(!isTXT) renderPDFPage(cur);
  }catch(e){
    showError('파일을 불러오지 못했습니다.<br>'+e.message,'돌아가기','index.html');
  }
}

/* ── TXT ── */
async function loadTXT(){
  document.getElementById('pageEl').style.display = 'none';
  const scroller = document.getElementById('txtScroller');
  scroller.style.display = 'block';
  
  const res=await fetch(FILE);
  if(!res.ok)throw new Error('HTTP '+res.status);
  const text=await res.text();
  
  document.getElementById('txtContent').textContent = text;
  calcTxtPages();
}

// 창 크기나 폰트가 변경되었을 때 전체 페이지 수 재계산
function calcTxtPages() {
  if (!isTXT) return;
  const content = document.getElementById('txtContent');
  
  // 정확한 폭 측정을 위해 임시로 트랜스폼 초기화
  content.style.transition = 'none';
  content.style.transform = `translateX(0px)`;
  
  setTimeout(() => {
    const scrollW = content.scrollWidth;
    const clientW = window.innerWidth;
    
    total = Math.ceil(scrollW / clientW);
    if(total === 0) total = 1;
    if(cur >= total) cur = total - 1;
    
    content.style.transition = 'transform 0.25s ease-out';
    updateTxtTransform();
    updateUI();
  }, 50);
}

function updateTxtTransform() {
  const content = document.getElementById('txtContent');
  const clientW = window.innerWidth;
  // 화면 너비만큼 컨테이너를 왼쪽으로 이동시킴
  content.style.transform = `translateX(-${cur * clientW}px)`;
}

/* ── PDF ── */
let pdfDoc=null;

async function loadPDF(){
  document.getElementById('btnRotate').style.display = 'flex'; // 회전 버튼 표시
  
  if(typeof pdfjsLib==='undefined')throw new Error('PDF.js 로드 실패');
  pdfjsLib.GlobalWorkerOptions.workerSrc=
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  pdfDoc=await pdfjsLib.getDocument(FILE).promise;
  total=pdfDoc.numPages;
  pages=Array.from({length:total},(_,i)=>i+1);
}

async function renderPDFPage(idx){
  cur = idx;
  const el=document.getElementById('pageEl');
  el.innerHTML=`<div class="page-canvas"><canvas id="pdfCanvas"></canvas></div>`;
  const pageNum=pages[idx];
  const page=await pdfDoc.getPage(pageNum);
  const canvas=document.getElementById('pdfCanvas');
  const ctx=canvas.getContext('2d');
  const stageW=window.innerWidth;
  const stageH=window.innerHeight-54;
  
  // 회전 적용
  const vpParams = { scale: 1, rotation: pdfRotation };
  const vp=page.getViewport(vpParams);
  const scale=Math.min(stageW/vp.width,stageH/vp.height)*0.95;
  const viewport=page.getViewport({scale, rotation: pdfRotation});
  
  canvas.width=viewport.width;
  canvas.height=viewport.height;
  await page.render({canvasContext:ctx,viewport}).promise;
  
  updateUI();
}

function rotatePDF() {
  if (isTXT) return;
  pdfRotation = (pdfRotation + 90) % 360;
  renderPDFPage(cur);
}

/* ── RENDER & UI ── */
function updateUI(){
  document.getElementById('hPage').textContent=`${cur+1} / ${total}`;
  const pct=total>1?(cur/(total-1))*100:100;
  document.getElementById('progressFill').style.width=pct+'%';
  savePosition();
}

/* ── NAVIGATION ── */
function nextPage(){if(animating||cur>=total-1)return;flip(1);}
function prevPage(){if(animating||cur<=0)return;flip(-1);}

function flip(dir){
  if(isTXT) {
    // TXT는 CSS Transform을 이용해 부드럽게 슬라이드
    cur += dir;
    updateTxtTransform();
    updateUI();
    
    // 연속 클릭 방지
    animating = true;
    setTimeout(() => { animating = false; }, 260);
  } else {
    // PDF는 요소 교체 방식이므로 CSS 애니메이션 적용
    animating=true;
    const el=document.getElementById('pageEl');
    const outClass=dir>0?'slide-out-left':'slide-out-right';
    const inClass=dir>0?'slide-in-right':'slide-in-left';

    el.classList.add(outClass);
    setTimeout(async()=>{
      el.classList.remove(outClass);
      cur+=dir;
      await renderPDFPage(cur);
      el.classList.add(inClass);
      updateUI();
      setTimeout(()=>{el.classList.remove(inClass);animating=false;},260);
    },260);
  }
}

/* ── SWIPE ── */
let touchX=0,touchY=0;
document.addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchX;
  const dy=e.changedTouches[0].clientY-touchY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){
    if(dx<0)nextPage();else prevPage();
  }
},{passive:true});

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')nextPage();
  if(e.key==='ArrowLeft')prevPage();
});

/* ── RESIZE HANDLING ── */
window.addEventListener('resize', () => {
  if (isTXT) {
    clearTimeout(window.resizeTimer);
    window.resizeTimer = setTimeout(calcTxtPages, 200);
  } else {
    clearTimeout(window.resizeTimer);
    window.resizeTimer = setTimeout(() => { renderPDFPage(cur); }, 200);
  }
});

/* ── SETTINGS ── */
function toggleSettings(){document.getElementById('settingsOverlay').classList.toggle('on');}
function closeSettings(e){if(e.target===document.getElementById('settingsOverlay'))document.getElementById('settingsOverlay').classList.remove('on');}

async function setFont(size){
  fontSize=size;
  localStorage.setItem('coldlib_font',size);
  document.documentElement.style.setProperty('--fsize',size+'px');
  markActiveFont();
  if(isTXT){
    // 글자 크기 변경 시 페이징 재계산
    calcTxtPages();
  }
}

function setTheme(t){
  theme=t;
  localStorage.setItem('coldlib_theme',t);
  document.documentElement.dataset.theme=t;
  markActiveTheme();
}

function markActiveFont(){
  document.querySelectorAll('.font-btn').forEach(b=>b.classList.toggle('active',+b.dataset.size===fontSize));
}
function markActiveTheme(){
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===theme));
}

/* ── POSITION SAVE/RESTORE ── */
function savePosition(){
  if(!FILE)return;
  localStorage.setItem('coldlib_pos_'+FILE,cur);
}
function restorePosition(){
  if(!FILE)return;
  const saved=localStorage.getItem('coldlib_pos_'+FILE);
  if(saved!==null)cur=Math.min(parseInt(saved),total-1);
}

/* ── HELPERS ── */
function doneLoading(){
  const l=document.getElementById('loading');
  l.classList.add('gone');
  setTimeout(()=>l.style.display='none',450);
}
function showError(msg,btnText,btnHref){
  doneLoading();
  document.body.insertAdjacentHTML('beforeend',`
    <div class="error-box">
      <span class="ms">error</span>
      <p>${msg}</p>
      <a href="${btnHref}">${btnText}</a>
    </div>`);
}
function goBack(){history.length>1?history.back():location.href='index.html';}

/* ── START ── */
load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ColdLib Reader</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"/>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<style>
/* 브라우저 기본 스와이프 액션(새로고침, 뒤로가기) 방지 */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;touch-action:none;overscroll-behavior:none;}

/* ── THEMES ── */
:root{
  --bg:#f9f5eb;--text:#2c1a0a;--text-mute:#9c7850;
  --header-bg:rgba(249,245,235,0.96);--header-border:rgba(0,0,0,0.07);
  --progress-bg:rgba(0,0,0,0.08);--progress-fill:#c8a030;
  --panel-bg:#fff;--panel-border:#e8e0d0;
  --page-shadow:rgba(0,0,0,0.1);
}
[data-theme=dark]{
  --bg:#1a1510;--text:#e0d0b8;--text-mute:#806848;
  --header-bg:rgba(26,21,16,0.96);--header-border:rgba(255,255,255,0.06);
  --progress-bg:rgba(255,255,255,0.08);--progress-fill:#c8a030;
  --panel-bg:#242018;--panel-border:#3a3020;
  --page-shadow:rgba(0,0,0,0.4);
}
[data-theme=sepia]{
  --bg:#f4ead0;--text:#3a2010;--text-mute:#9a6840;
  --header-bg:rgba(244,234,208,0.96);--header-border:rgba(0,0,0,0.08);
  --progress-bg:rgba(0,0,0,0.1);--progress-fill:#a06020;
  --panel-bg:#f8f0dc;--panel-border:#d8c8a0;
  --page-shadow:rgba(0,0,0,0.12);
}

body{
  font-family:'Pretendard',sans-serif;
  background:var(--bg); color:var(--text);
  transition:background .3s,color .3s;
}

/* ── LOADING ── */
.loading{position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity .4s ease}
.loading.gone{opacity:0;pointer-events:none}
.loading .ms{font-family:'Material Symbols Outlined';font-size:40px;color:var(--progress-fill);
  animation:spin 1.4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:12px;font-weight:700;letter-spacing:.2em;color:var(--text-mute);text-transform:uppercase}

/* ── UI BARS (몰입모드 애니메이션 적용) ── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:48px; display:flex;align-items:center;gap:8px; padding:0 12px;
  background:var(--header-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--header-border);
  transition:transform .3s cubic-bezier(0.4, 0, 0.2, 1);
}
.bottom-bar {
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:56px; display:flex;align-items:center;gap:16px; padding:0 20px;
  background:var(--header-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--header-border);
  transition:transform .3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* 화면 숨김 상태 클래스 */
body.ui-hidden .header { transform: translateY(-100%); }
body.ui-hidden .bottom-bar { transform: translateY(100%); }

.btn-icon{width:36px;height:36px;border-radius:8px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-mute);transition:.2s;flex-shrink:0}
.btn-icon:hover{background:rgba(128,128,128,0.1)}
.btn-icon .ms{font-family:'Material Symbols Outlined';font-size:22px}

.header-title{flex:1;font-size:13px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;
  letter-spacing:.02em}

/* 스크러버(탐색바) 스타일 */
.bar-text { font-size: 11px; font-weight: 700; color: var(--text-mute); min-width: 32px; text-align: center; }
.page-slider { flex: 1; -webkit-appearance: none; background: transparent; }
.page-slider:focus { outline: none; }
.page-slider::-webkit-slider-runnable-track { height: 4px; background: var(--progress-bg); border-radius: 2px; }
.page-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; 
  background: var(--progress-fill); border-radius: 50%; 
  margin-top: -7px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

/* ── STAGE (reading area) ── */
.stage{
  position:fixed; top:0; left:0; right:0; bottom:0;
  overflow:hidden; display:flex;align-items:center;justify-content:center;
  /* 터치 이벤트가 Stage 전체에서 감지되도록 설정 */
  cursor: pointer;
}

/* ── PDF PAGE ── */
.page{
  position:absolute; inset:0; padding:28px 24px 24px;
  overflow:hidden; display:flex;flex-direction:column;
  will-change:transform;
}
.page-canvas{ flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden; pointer-events:none; }
.page-canvas canvas{ max-width:100%;max-height:100%; object-fit:contain; box-shadow:0 4px 20px var(--page-shadow); }

/* ── TXT SCROLLER (Multi-column) ── */
.txt-scroller { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.txt-content {
  height: 100%; padding: 48px 24px 56px; /* 모바일 헤더/하단바 여백 고려 */
  box-sizing: border-box;
  column-width: calc(100vw - 48px);
  column-gap: 48px;
  word-break: break-word; white-space: pre-wrap;
  color: var(--text); font-family: 'Nanum Myeongjo', Georgia, serif;
  font-size: var(--fsize, 17px); line-height: 1.95;
  will-change: transform;
}

/* 코너 장식 */
.stage::after{
  content:'';position:absolute;bottom:12px;right:12px; width:18px;height:18px;
  border-right:1px solid var(--text-mute); border-bottom:1px solid var(--text-mute);
  opacity:0.2;border-radius:0 0 2px 0; pointer-events: none;
}

/* ── SETTINGS PANEL ── */
.settings-overlay{
  position:fixed;inset:0;z-index:200; background:rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .25s ease;
  display:flex;align-items:flex-end;justify-content:center;
}
.settings-overlay.on{opacity:1;pointer-events:all}
.settings-panel{
  width:100%;max-width:480px; background:var(--panel-bg);
  border-radius:20px 20px 0 0; border-top:1px solid var(--panel-border);
  padding:0 0 calc(env(safe-area-inset-bottom) + 16px);
  transform:translateY(100%); transition:transform .35s cubic-bezier(.16,1,.3,1);
}
.settings-overlay.on .settings-panel{transform:translateY(0)}
.settings-handle{width:40px;height:4px;border-radius:2px; background:var(--panel-border);margin:14px auto 20px}
.settings-group{padding:0 20px 16px}
.settings-label{font-size:9.5px;font-weight:900;letter-spacing:.16em;text-transform:uppercase; color:var(--text-mute);margin-bottom:10px;display:block}
.font-btns, .theme-btns {display:flex;gap:8px}
.font-btn, .theme-btn {flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--panel-border); background:transparent;color:var(--text);cursor:pointer;font-weight:700;transition:.18s;text-align:center}
.font-btn {font-family:'Nanum Myeongjo',serif;}
.theme-btn {font-size:11px;}
.font-btn:hover,.font-btn.active,.theme-btn:hover,.theme-btn.active{border-color:var(--progress-fill);background:rgba(200,160,48,0.1);color:var(--text)}
.settings-sep{height:1px;background:var(--panel-border);margin:0 20px 16px}

/* Error */
.error-box{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg);padding:32px}
.error-box .ms{font-family:'Material Symbols Outlined';font-size:40px;color:#c0392b}
.error-box p{font-size:13px;color:var(--text-mute);text-align:center;line-height:1.6}
.error-box a{padding:11px 24px;background:#1a0c04;color:#f2e8d0;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none;letter-spacing:.08em}
</style>
</head>
<body class="ui-hidden"> <div class="loading" id="loading">
  <span class="ms">auto_stories</span>
  <p>불러오는 중</p>
</div>

<header class="header">
  <button class="btn-icon" onclick="goBack()"><span class="ms">arrow_back</span></button>
  <button class="btn-icon" id="btnRotate" onclick="rotatePDF()" style="display:none;"><span class="ms">screen_rotation</span></button>
  <div class="header-title" id="hTitle">—</div>
  <button class="btn-icon" onclick="toggleSettings()"><span class="ms">tune</span></button>
</header>

<div class="stage" id="stage">
  <div class="page" id="pageEl"></div>
  
  <div class="txt-scroller" id="txtScroller" style="display:none;">
    <div class="txt-content" id="txtContent"></div>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <span class="bar-text" id="bPageCur">1</span>
  <input type="range" class="page-slider" id="pageSlider" min="0" max="100" value="0" oninput="slidePage(this.value)" onchange="seekPage(this.value)">
  <span class="bar-text" id="bPageTot">1</span>
</div>

<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings(event)">
  <div class="settings-panel">
    <div class="settings-handle"></div>
    <div class="settings-group">
      <span class="settings-label">글자 크기</span>
      <div class="font-btns">
        <button class="font-btn" data-size="15" onclick="setFont(15)">작게</button>
        <button class="font-btn" data-size="17" onclick="setFont(17)">보통</button>
        <button class="font-btn" data-size="20" onclick="setFont(20)">크게</button>
        <button class="font-btn" data-size="23" onclick="setFont(23)">최대</button>
      </div>
    </div>
    <div class="settings-sep"></div>
    <div class="settings-group">
      <span class="settings-label">테마</span>
      <div class="theme-btns">
        <button class="theme-btn" data-theme="light" onclick="setTheme('light')">☀️ 라이트</button>
        <button class="theme-btn" data-theme="sepia" onclick="setTheme('sepia')">📜 세피아</button>
        <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')">🌙 다크</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
/* ── URL PARAMS ── */
const params=new URLSearchParams(location.search);
const FILE=params.get('file')||'';
const EXT=FILE.split('.').pop().toLowerCase();
const TITLE=params.get('title')||decodeURIComponent(FILE.replace(/^.*\//, '').replace(/\.[^.]+$/, ''));

/* ── STATE ── */
let isTXT = (EXT !== 'pdf');
let pages=[];
let cur=0;
let total=0;
let animating=false;
let fontSize=parseInt(localStorage.getItem('coldlib_font')||'17');
let theme=localStorage.getItem('coldlib_theme')||'light';
let pdfRotation = 0; 

/* ── INIT ── */
document.title=TITLE+' — ColdLib';
document.getElementById('hTitle').textContent=TITLE;
document.documentElement.dataset.theme=theme;
document.documentElement.style.setProperty('--fsize',fontSize+'px');
markActiveFont();markActiveTheme();

/* ── LOAD ── */
async function load(){
  if(!FILE){showError('파일 정보가 없습니다.','index.html로 돌아가기','index.html');return;}
  try{
    if(isTXT) await loadTXT();
    else await loadPDF();
    
    restorePosition();
    doneLoading();
    
    if(!isTXT) await renderPDFPage(cur);
    updateUI();
  }catch(e){
    showError('파일을 불러오지 못했습니다.<br>'+e.message,'돌아가기','index.html');
  }
}

/* ── TXT ── */
async function loadTXT(){
  document.getElementById('pageEl').style.display = 'none';
  const scroller = document.getElementById('txtScroller');
  scroller.style.display = 'block';
  
  const res=await fetch(FILE);
  if(!res.ok)throw new Error('HTTP '+res.status);
  const text=await res.text();
  
  document.getElementById('txtContent').textContent = text;
  calcTxtPages();
}

function calcTxtPages() {
  if (!isTXT) return;
  const content = document.getElementById('txtContent');
  content.style.transition = 'none';
  content.style.transform = `translateX(0px)`;
  
  setTimeout(() => {
    const scrollW = content.scrollWidth;
    const clientW = window.innerWidth;
    total = Math.ceil(scrollW / clientW);
    if(total === 0) total = 1;
    if(cur >= total) cur = total - 1;
    snapBack();
    updateUI();
  }, 50);
}

/* ── PDF ── */
let pdfDoc=null;

async function loadPDF(){
  document.getElementById('btnRotate').style.display = 'flex'; 
  if(typeof pdfjsLib==='undefined')throw new Error('PDF.js 로드 실패');
  pdfjsLib.GlobalWorkerOptions.workerSrc=
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  pdfDoc=await pdfjsLib.getDocument(FILE).promise;
  total=pdfDoc.numPages;
  pages=Array.from({length:total},(_,i)=>i+1);
}

async function renderPDFPage(idx){
  cur = idx;
  const el=document.getElementById('pageEl');
  el.innerHTML=`<div class="page-canvas"><canvas id="pdfCanvas"></canvas></div>`;
  const pageNum=pages[idx];
  const page=await pdfDoc.getPage(pageNum);
  const canvas=document.getElementById('pdfCanvas');
  const ctx=canvas.getContext('2d');
  
  const stageW=window.innerWidth;
  const stageH=window.innerHeight;
  const vpParams = { scale: 1, rotation: pdfRotation };
  const vp=page.getViewport(vpParams);
  const scale=Math.min(stageW/vp.width, stageH/vp.height) * 0.95;
  const viewport=page.getViewport({scale, rotation: pdfRotation});
  
  canvas.width=viewport.width; canvas.height=viewport.height;
  await page.render({canvasContext:ctx,viewport}).promise;
}

function rotatePDF() {
  if (isTXT) return;
  pdfRotation = (pdfRotation + 90) % 360;
  renderPDFPage(cur);
}

/* ── RENDER & UI ── */
function updateUI(){
  document.getElementById('bPageCur').textContent = cur + 1;
  document.getElementById('bPageTot').textContent = total;
  const slider = document.getElementById('pageSlider');
  slider.max = Math.max(0, total - 1);
  slider.value = cur;
  savePosition();
}

function slidePage(val) { document.getElementById('bPageCur').textContent = parseInt(val) + 1; }
function seekPage(val) {
  const target = parseInt(val);
  if(target === cur) return;
  const dir = target > cur ? 1 : -1;
  cur = target - dir; // 바로 전 단계로 맞춘 뒤 플립시켜 자연스럽게 넘어가게 연출
  flip(dir);
}

function toggleUI() { document.body.classList.toggle('ui-hidden'); }

/* ── NAVIGATION & SWIPE TRACKING ── */
function nextPage(){ if(animating || cur >= total - 1) { snapBack(); return; } flip(1); }
function prevPage(){ if(animating || cur <= 0) { snapBack(); return; } flip(-1); }

function flip(dir){
  animating = true;
  cur += dir;
  
  if(isTXT) {
    snapBack();
    updateUI();
    setTimeout(() => { animating = false; }, 260);
  } else {
    // PDF 부드러운 교체 슬라이드 애니메이션
    const el = document.getElementById('pageEl');
    const outX = dir > 0 ? -window.innerWidth : window.innerWidth;
    const inX = dir > 0 ? window.innerWidth : -window.innerWidth;

    el.style.transition = 'transform 0.15s ease-in';
    el.style.transform = `translateX(${outX}px)`;

    setTimeout(async () => {
      el.style.transition = 'none';
      el.style.transform = `translateX(${inX}px)`;
      await renderPDFPage(cur);
      updateUI();

      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.style.transition = 'transform 0.25s ease-out';
        el.style.transform = `translateX(0px)`;
        setTimeout(() => { animating = false; }, 250);
      }));
    }, 150);
  }
}

// 스와이프 관련 변수
const stageEl = document.getElementById('stage');
const txtContent = document.getElementById('txtContent');
const pageEl = document.getElementById('pageEl');
let tStartX = 0, tStartY = 0, swipeDiff = 0, isDragging = false, dragStartTime = 0;

stageEl.addEventListener('touchstart', e => {
  if(e.touches.length > 1) return; // 핀치 줌 방지
  tStartX = e.touches[0].clientX; tStartY = e.touches[0].clientY;
  isDragging = true; swipeDiff = 0; dragStartTime = Date.now();
  
  if(isTXT) txtContent.style.transition = 'none';
  else pageEl.style.transition = 'none';
}, {passive: true});

stageEl.addEventListener('touchmove', e => {
  if(!isDragging) return;
  const dx = e.touches[0].clientX - tStartX;
  const dy = e.touches[0].clientY - tStartY;

  // 상하 스크롤이 강할 경우 제스처 취소 (TXT 단 분할 시엔 상하 스크롤 없으나 예방)
  if(Math.abs(dy) > Math.abs(dx) + 10) { isDragging = false; snapBack(); return; }
  swipeDiff = dx;

  // 양끝 저항 효과 (Rubber band effect)
  let targetX = dx;
  if(cur === 0 && dx > 0) targetX = dx * 0.25;
  else if(cur === total - 1 && dx < 0) targetX = dx * 0.25;

  if(isTXT) txtContent.style.transform = `translateX(calc(-${cur * window.innerWidth}px + ${targetX}px))`;
  else pageEl.style.transform = `translateX(${targetX}px)`;
}, {passive: true});

stageEl.addEventListener('touchend', e => {
  if(!isDragging) return;
  isDragging = false;
  const dragTime = Date.now() - dragStartTime;
  const velocity = Math.abs(swipeDiff) / dragTime;

  // 짧고 움직임이 없으면 '터치(클릭)'으로 판단
  if (Math.abs(swipeDiff) < 10 && dragTime < 300) {
    snapBack();
    handleTap(e.changedTouches[0].clientX);
    return;
  }

  // 화면 3분의 1 이상 넘기거나, 빠르게 휙 넘긴 경우 페이지 전환
  if (Math.abs(swipeDiff) > window.innerWidth / 3 || velocity > 0.4) {
    if (swipeDiff > 0 && cur > 0) prevPage();
    else if (swipeDiff < 0 && cur < total - 1) nextPage();
    else snapBack();
  } else {
    snapBack();
  }
});

function snapBack() {
  if(isTXT) {
    txtContent.style.transition = 'transform 0.25s ease-out';
    txtContent.style.transform = `translateX(-${cur * window.innerWidth}px)`;
  } else {
    pageEl.style.transition = 'transform 0.25s ease-out';
    pageEl.style.transform = `translateX(0px)`;
  }
}

// 탭 영역 판단 (좌/우 30% 영역 클릭 시 이동, 중앙 클릭 시 UI 토글)
function handleTap(clientX) {
  if(animating) return;
  const w = window.innerWidth;
  if (clientX < w * 0.3) prevPage();
  else if (clientX > w * 0.7) nextPage();
  else toggleUI();
}

/* ── KEYBOARD & RESIZE ── */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')nextPage();
  if(e.key==='ArrowLeft')prevPage();
});

window.addEventListener('resize', () => {
  if (isTXT) { clearTimeout(window.resizeTimer); window.resizeTimer = setTimeout(calcTxtPages, 200); }
  else { clearTimeout(window.resizeTimer); window.resizeTimer = setTimeout(() => { renderPDFPage(cur); }, 200); }
});

/* ── SETTINGS ── */
function toggleSettings(){document.getElementById('settingsOverlay').classList.toggle('on');}
function closeSettings(e){if(e.target===document.getElementById('settingsOverlay'))document.getElementById('settingsOverlay').classList.remove('on');}

function setFont(size){
  fontSize=size; localStorage.setItem('coldlib_font',size);
  document.documentElement.style.setProperty('--fsize',size+'px');
  markActiveFont(); if(isTXT) calcTxtPages();
}

function setTheme(t){
  theme=t; localStorage.setItem('coldlib_theme',t);
  document.documentElement.dataset.theme=t; markActiveTheme();
}
function markActiveFont(){ document.querySelectorAll('.font-btn').forEach(b=>b.classList.toggle('active',+b.dataset.size===fontSize)); }
function markActiveTheme(){ document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===theme)); }

/* ── STORAGE & HELPERS ── */
function savePosition(){ if(!FILE)return; localStorage.setItem('coldlib_pos_'+FILE,cur); }
function restorePosition(){
  if(!FILE)return;
  const saved=localStorage.getItem('coldlib_pos_'+FILE);
  if(saved!==null)cur=Math.min(parseInt(saved),total-1);
}

function doneLoading(){ const l=document.getElementById('loading'); l.classList.add('gone'); setTimeout(()=>l.style.display='none',450); }
function showError(msg,btnText,btnHref){
  doneLoading();
  document.body.insertAdjacentHTML('beforeend',`
    <div class="error-box">
      <span class="ms">error</span><p>${msg}</p>
      <a href="${btnHref}">${btnText}</a>
    </div>`);
}
function goBack(){history.length>1?history.back():location.href='index.html';}

/* ── START ── */
load();
</script>
</body>
</html>

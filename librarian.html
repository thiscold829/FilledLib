<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColdLib — 사서</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Pretendard',sans-serif;background:#f2f0ec;color:#1a0c04}

/* ── HEADER ── */
.hdr{background:#1a0c04;padding:16px 24px;display:flex;align-items:center;gap:12px}
.hdr-title{font-family:'Cinzel',serif;font-size:18px;font-weight:600;color:rgba(200,162,48,0.9);letter-spacing:.15em}
.hdr-sub{font-size:10px;font-weight:700;color:rgba(200,162,48,0.35);letter-spacing:.2em;text-transform:uppercase;margin-left:auto}
.ms{font-family:'Material Symbols Outlined';font-size:20px;color:rgba(200,162,48,0.6)}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 56px)}
.sidebar{width:320px;flex-shrink:0;background:#fff;border-right:1px solid #e8e4dc;display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;padding:24px}

/* ── SIDEBAR HEADER ── */
.sb-head{padding:16px;border-bottom:1px solid #e8e4dc;display:flex;align-items:center;gap:8px}
.sb-head h2{font-size:13px;font-weight:800;letter-spacing:.04em;flex:1}
.btn-add{display:flex;align-items:center;gap:4px;padding:7px 12px;border-radius:8px;
  background:#1a0c04;color:#f2e8d0;border:none;cursor:pointer;font-size:12px;font-weight:700;transition:.2s}
.btn-add:hover{background:#3c1e0a}
.btn-add .ms{font-size:16px;color:rgba(200,162,48,0.8)}

/* ── BOOK LIST ── */
.book-list{flex:1;overflow-y:auto;padding:8px}
.book-list::-webkit-scrollbar{width:4px}
.book-list::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.book-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:8px;cursor:pointer;transition:.15s;border:2px solid transparent}
.book-item:hover{background:#f5f0e8}
.book-item.active{background:#f5f0e8;border-color:rgba(200,162,48,0.4)}
.bi-cover{width:30px;height:40px;border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bi-cover .ms{font-size:16px;color:rgba(255,255,255,0.85);position:relative;z-index:1}
.bi-info{flex:1;min-width:0}
.bi-title{font-size:12px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bi-author{font-size:10px;color:#9c7040;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bi-del{width:28px;height:28px;border-radius:6px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.bi-del:hover{background:#fee2e2}
.bi-del .ms{font-size:16px;color:#999}
.bi-del:hover .ms{color:#dc2626}
.empty-list{text-align:center;padding:40px 16px;color:#bbb}
.empty-list .ms{font-size:32px;display:block;margin-bottom:8px}

/* ── MAIN FORM ── */
.form-wrap{max-width:640px;margin:0 auto}
.form-title{font-family:'Cinzel',serif;font-size:18px;font-weight:600;color:#1a0c04;margin-bottom:20px}
.form-section{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #e8e4dc}
.form-section-title{font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:#9c7040;margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
label{font-size:10.5px;font-weight:800;color:#5c3820;letter-spacing:.06em}
input,select,textarea{padding:9px 11px;border:1.5px solid #e0d8cc;border-radius:8px;font-family:'Pretendard';font-size:13px;color:#1a0c04;background:#faf8f4;outline:none;transition:.15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:rgba(200,162,48,0.6);background:#fff}
textarea{resize:vertical;min-height:80px;line-height:1.6}

/* ── ICON PICKER ── */
.icon-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.icon-opt{width:40px;height:40px;border-radius:8px;border:2px solid #e0d8cc;background:#faf8f4;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;position:relative}
.icon-opt .ms{font-size:20px;color:#9c7040}
.icon-opt:hover{border-color:rgba(200,162,48,0.5);background:#f5f0e8}
.icon-opt.selected{border-color:rgba(200,162,48,0.8);background:rgba(200,162,48,0.1)}
.icon-opt.selected .ms{color:#1a0c04}
.icon-custom{flex:1;min-width:120px}

/* ── COLOR PICKER ── */
.color-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.color-swatch{width:32px;height:32px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:.15s;flex-shrink:0}
.color-swatch:hover{transform:scale(1.1)}
.color-swatch.selected{border-color:#fff;box-shadow:0 0 0 2px rgba(200,162,48,0.7)}
input[type=color]{width:32px;height:32px;padding:1px;border-radius:6px;cursor:pointer;border:2px solid #e0d8cc}

/* ── PREVIEW ── */
.preview-wrap{display:flex;align-items:flex-end;gap:16px}
.preview-book{width:80px;height:110px;border-radius:2px 5px 5px 2px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:8px;overflow:hidden;box-shadow:3px 6px 16px rgba(0,0,0,0.35)}
.preview-book .spine{position:absolute;left:0;top:0;bottom:0;width:6px;background:linear-gradient(90deg,rgba(0,0,0,0.35),transparent);z-index:2;pointer-events:none}
.preview-book .pages{position:absolute;right:0;top:0;bottom:0;width:4px;background:rgba(230,222,200,0.7);z-index:2;pointer-events:none}
.preview-book .gloss{position:absolute;inset:0;z-index:3;mix-blend-mode:overlay;pointer-events:none;background:radial-gradient(ellipse 150% 95% at 12% -8%,rgba(255,255,255,0.55) 0%,rgba(255,255,255,0.22) 32%,rgba(255,255,255,0) 60%)}
.preview-book .pv-ic{font-family:'Material Symbols Outlined';font-size:28px;color:rgba(255,255,255,0.88);position:relative;z-index:4;text-shadow:0 1px 6px rgba(0,0,0,0.4)}
.preview-book .pv-ttl{font-size:8px;font-weight:800;color:rgba(255,255,255,0.92);text-align:center;position:relative;z-index:4;line-height:1.3;max-height:32px;overflow:hidden}
.preview-label{font-size:10px;font-weight:700;color:#9c7040;letter-spacing:.06em}

/* ── ACTIONS ── */
.form-actions{display:flex;gap:10px;margin-top:8px}
.btn-save{flex:1;padding:13px;background:#1a0c04;color:#f2e8d0;border:none;border-radius:10px;font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:.24s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-save:hover{background:#3c1e0a;transform:translateY(-1px)}
.btn-save .ms{font-size:16px;color:rgba(200,162,48,0.8)}
.btn-cancel{padding:13px 20px;border-radius:10px;background:#f2f0ec;border:1.5px solid #e0d8cc;color:#9c7040;font-family:'Pretendard';font-size:12px;font-weight:700;cursor:pointer;transition:.2s}
.btn-cancel:hover{background:#e8e4dc}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a0c04;color:#f2e8d0;padding:11px 20px;border-radius:10px;font-size:12px;font-weight:700;letter-spacing:.06em;z-index:999;transition:transform .3s ease,opacity .3s ease;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* empty form */
.form-empty{text-align:center;padding:80px 20px;color:#bbb}
.form-empty .ms{font-size:48px;display:block;margin-bottom:16px;color:#d8d0c4}
.form-empty p{font-size:13px;font-weight:600}

@media(max-width:640px){
  .layout{flex-direction:column}
  .sidebar{width:100%;height:220px;border-right:none;border-bottom:1px solid #e8e4dc}
  .main{padding:16px}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="hdr">
  <span class="ms">auto_stories</span>
  <div class="hdr-title">ColdLib</div>
  <div class="hdr-sub">사서 관리</div>
</header>

<div class="layout">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sb-head">
      <h2>소장 도서</h2>
      <button class="btn-add" onclick="newBook()">
        <span class="ms">add</span>추가
      </button>
    </div>
    <div class="book-list" id="bookList"></div>
  </aside>

  <!-- 메인 폼 -->
  <main class="main" id="mainArea">
    <div class="form-empty">
      <span class="ms">menu_book</span>
      <p>왼쪽에서 책을 선택하거나<br>새 책을 추가하세요</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID=(typeof CONFIG!=='undefined')?CONFIG.SHEET_ID:'';
const API_URL=(typeof CONFIG!=='undefined')?CONFIG.API_URL:'';

const PRESET_COLORS=['#c0392b','#1a5276','#2980b9','#2c3e50','#6c3483','#784212','#1e8449','#b7770d','#117a65','#154360','#922b21','#b7950b','#1d6a2f','#a04060','#148f77','#a04000','#27ae60','#1f618d','#922b55','#4a235a','#1c6b28'];
const PRESET_ICONS=['language','auto_stories','star','book','menu_book','import_contacts','public','science','psychology','rocket_launch','favorite','eco','gavel','visibility','diamonds','forest','biotech','nightlife','agriculture','groups','person','wb_sunny','bug_report','family_history'];

let BOOKS=[];
let editIdx=-1; // -1 = new

/* ── FETCH ── */
function parseCSV(t){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<t.length;i++){
    const c=t[i],nc=t[i+1];
    if(c==='"'){if(q&&nc==='"'){cur+='"';i++;}else q=!q;}
    else if(c===','&&!q){row.push(cur.replace(/\r/g,'').trim());cur='';}
    else if(c==='\n'&&!q){row.push(cur.replace(/\r/g,'').trim());rows.push(row);row=[];cur='';}
    else cur+=c;
  }
  row.push(cur.replace(/\r/g,'').trim());rows.push(row);
  if(rows.length<2)return[];
  const h=rows[0];
  return rows.slice(1).filter(r=>r.some(v=>v!=='')).map(r=>{const o={};h.forEach((k,i)=>o[k]=r[i]??'');return o;});
}

async function fetchBooks(){
  if(!SHEET_ID){renderList();return;}
  try{
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=books&_=${Date.now()}`);
    if(!res.ok)throw new Error('HTTP '+res.status);
    BOOKS=parseCSV(await res.text());
  }catch(e){showToast('불러오기 실패: '+e.message);}
  renderList();
}

/* ── SAVE TO SHEETS ── */
async function saveToSheets(){
  if(!API_URL){showToast('API_URL 없음');return false;}
  const payload={action:'write',sheetName:'books',data:BOOKS.map((b,i)=>({
    id:b.id||'book_'+(i+1).toString().padStart(3,'0'),
    title:b.title||'',author:b.author||'',year:b.year||'',
    genre:b.genre||'',pages:b.pages||'',wordcount:b.wordcount||'',
    summary:b.summary||'',filename:b.filename||'',
    icon:b.icon||'language',bg_color:b.bg_color||'#3a2010'
  }))};
  try{
    const res=await fetch(API_URL,{method:'POST',body:new URLSearchParams({payload:JSON.stringify(payload)})});
    const json=await res.json();
    if(!json.ok)throw new Error(json.error);
    return true;
  }catch(e){showToast('저장 실패: '+e.message);return false;}
}

/* ── LIST ── */
function renderList(){
  const el=document.getElementById('bookList');
  if(!BOOKS.length){
    el.innerHTML='<div class="empty-list"><span class="ms">auto_stories</span><div>등록된 책 없음</div></div>';
    return;
  }
  el.innerHTML=BOOKS.map((b,i)=>`
    <div class="book-item ${editIdx===i?'active':''}" onclick="selectBook(${i})">
      <div class="bi-cover" style="background:${b.bg_color||'#3a2010'}">
        <span class="ms">${b.icon||'language'}</span>
      </div>
      <div class="bi-info">
        <div class="bi-title">${b.title||'(제목 없음)'}</div>
        <div class="bi-author">${b.author||''}</div>
      </div>
      <button class="bi-del" onclick="deleteBook(event,${i})"><span class="ms">delete</span></button>
    </div>
  `).join('');
}

/* ── SELECT / NEW / DELETE ── */
function selectBook(i){editIdx=i;renderList();renderForm();}
function newBook(){
  BOOKS.push({id:'',title:'',author:'',year:'',genre:'',pages:'',wordcount:'',summary:'',filename:'',icon:'language',bg_color:'#3a2010'});
  editIdx=BOOKS.length-1;
  renderList();renderForm();
}
async function deleteBook(e,i){
  e.stopPropagation();
  if(!confirm(`"${BOOKS[i].title||'이 책'}"을 삭제할까요?`))return;
  BOOKS.splice(i,1);
  if(editIdx===i)editIdx=-1;
  else if(editIdx>i)editIdx--;
  renderList();
  if(editIdx<0)document.getElementById('mainArea').innerHTML='<div class="form-empty"><span class="ms">menu_book</span><p>왼쪽에서 책을 선택하거나<br>새 책을 추가하세요</p></div>';
  const ok=await saveToSheets();
  if(ok)showToast('삭제되었습니다');
}

/* ── FORM ── */
let selColor='#3a2010',selIcon='language';

function renderForm(){
  if(editIdx<0)return;
  const b=BOOKS[editIdx];
  selColor=b.bg_color||'#3a2010';
  selIcon=b.icon||'language';

  document.getElementById('mainArea').innerHTML=`
    <div class="form-wrap">
      <div class="form-title">${editIdx<BOOKS.length&&b.id?'책 편집':'새 책 추가'}</div>

      <!-- 기본 정보 -->
      <div class="form-section">
        <div class="form-section-title">기본 정보</div>
        <div class="form-row full"><div class="form-group">
          <label>제목</label>
          <input type="text" id="f-title" value="${esc(b.title)}" oninput="livePreview()" placeholder="책 제목">
        </div></div>
        <div class="form-row">
          <div class="form-group"><label>저자</label><input type="text" id="f-author" value="${esc(b.author)}" placeholder="저자명"></div>
          <div class="form-group"><label>장르</label><input type="text" id="f-genre" value="${esc(b.genre)}" placeholder="소설, 인문, 과학..."></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>연도</label><input type="text" id="f-year" value="${esc(b.year)}" placeholder="1997"></div>
          <div class="form-group"><label>페이지수</label><input type="number" id="f-pages" value="${esc(b.pages)}" placeholder="300"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>글자수</label><input type="number" id="f-wordcount" value="${esc(b.wordcount)}" placeholder="80000"></div>
          <div class="form-group"><label>파일명</label><input type="text" id="f-filename" value="${esc(b.filename)}" placeholder="books/제목.html"></div>
        </div>
        <div class="form-row full"><div class="form-group">
          <label>한줄 요약</label>
          <textarea id="f-summary" placeholder="책 뒷면에 표시될 소개글">${esc(b.summary)}</textarea>
        </div></div>
      </div>

      <!-- 표지 디자인 -->
      <div class="form-section">
        <div class="form-section-title">표지 디자인</div>
        <div class="form-row">
          <div>
            <label style="display:block;margin-bottom:8px">아이콘</label>
            <div class="icon-picker" id="iconPicker">
              ${PRESET_ICONS.map(ic=>`<div class="icon-opt ${selIcon===ic?'selected':''}" onclick="pickIcon('${ic}')" title="${ic}"><span class="ms">${ic}</span></div>`).join('')}
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
              <label style="white-space:nowrap">직접 입력:</label>
              <input type="text" id="f-icon" class="icon-custom" value="${esc(selIcon)}" placeholder="Material Symbol 이름" oninput="pickIcon(this.value,true)">
            </div>
          </div>
          <div>
            <label style="display:block;margin-bottom:8px">표지색</label>
            <div class="color-row" id="colorRow">
              ${PRESET_COLORS.map(c=>`<div class="color-swatch ${selColor===c?'selected':''}" style="background:${c}" onclick="pickColor('${c}')" title="${c}"></div>`).join('')}
              <input type="color" id="f-color" value="${selColor}" oninput="pickColor(this.value,true)" title="직접 선택">
            </div>
            <div style="margin-top:14px">
              <div class="preview-label" style="margin-bottom:8px">미리보기</div>
              <div class="preview-wrap">
                <div class="preview-book" id="prevBook" style="background:linear-gradient(180deg,${lighterCSS(selColor,30)} 0%,${selColor} 55%)">
                  <div class="spine"></div><div class="pages"></div><div class="gloss"></div>
                  <span class="pv-ic" id="prevIcon">${selIcon}</span>
                  <div class="pv-ttl" id="prevTitle">${esc(b.title)||'제목'}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-save" onclick="saveBook()"><span class="ms">save</span>저장</button>
        <button class="btn-cancel" onclick="cancelEdit()">취소</button>
      </div>
    </div>
  `;
}

function esc(s){return(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function lighterCSS(hex,amt){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  if(isNaN(r))return hex;
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}

function pickIcon(icon,fromInput=false){
  selIcon=icon||'language';
  if(!fromInput){const el=document.getElementById('f-icon');if(el)el.value=selIcon;}
  document.querySelectorAll('.icon-opt').forEach(el=>el.classList.toggle('selected',el.querySelector('.ms')?.textContent===selIcon));
  const p=document.getElementById('prevIcon');if(p)p.textContent=selIcon;
}
function pickColor(col,fromInput=false){
  selColor=col;
  if(!fromInput){const el=document.getElementById('f-color');if(el)el.value=col;}
  document.querySelectorAll('.color-swatch').forEach(el=>el.classList.toggle('selected',el.style.background===col));
  updatePreviewBg();
}
function updatePreviewBg(){
  const p=document.getElementById('prevBook');
  if(p)p.style.background=`linear-gradient(180deg,${lighterCSS(selColor,30)} 0%,${selColor} 55%)`;
}
function livePreview(){
  const t=document.getElementById('f-title')?.value||'제목';
  const p=document.getElementById('prevTitle');if(p)p.textContent=t;
}

async function saveBook(){
  if(editIdx<0)return;
  const b=BOOKS[editIdx];
  b.title=document.getElementById('f-title')?.value||'';
  b.author=document.getElementById('f-author')?.value||'';
  b.genre=document.getElementById('f-genre')?.value||'';
  b.year=document.getElementById('f-year')?.value||'';
  b.pages=document.getElementById('f-pages')?.value||'';
  b.wordcount=document.getElementById('f-wordcount')?.value||'';
  b.filename=document.getElementById('f-filename')?.value||'';
  b.summary=document.getElementById('f-summary')?.value||'';
  b.icon=selIcon;
  b.bg_color=selColor;
  if(!b.id)b.id='book_'+(Date.now());
  renderList();
  const ok=await saveToSheets();
  if(ok)showToast('저장되었습니다 ✓');
}

function cancelEdit(){
  // 신규 추가 후 취소 시 해당 항목 제거
  if(editIdx>=0&&!BOOKS[editIdx].id){BOOKS.splice(editIdx,1);}
  editIdx=-1;renderList();
  document.getElementById('mainArea').innerHTML='<div class="form-empty"><span class="ms">menu_book</span><p>왼쪽에서 책을 선택하거나<br>새 책을 추가하세요</p></div>';
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

fetchBooks();
</script>
</body>
</html>
